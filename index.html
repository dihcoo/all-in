<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DepthImpact Hybrid</title>
    <style>
        :root {
            --neon: #00ffcc;
            --neon-dim: rgba(0, 255, 204, 0.25);
            --bg: #000000;
            --panel: #0d0d10;
            --red: #ff0033;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: rgba(220, 255, 248, 0.9);
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arched Container for the Sphere */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: black;
        }

        .top-header {
            padding: 15px 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .top-header h1 {
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            color: #fff;
        }

        .hdr-btn {
            position: absolute;
            right: 15px;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--neon);
            border: 1px solid rgba(0, 255, 204, 0.3);
            background: #0d0d10;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* The "Dome" Section */
        .main-interface {
            flex: 1.2;
            background: radial-gradient(circle at center, #0a1a1a 0%, #000 100%);
            border-radius: 50% 50% 0 0 / 25% 25% 0 0; /* Creates the arched look */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(0, 255, 204, 0.1);
            position: relative;
            margin-top: 10px;
        }

        .sphere-label {
            font-size: 9px;
            letter-spacing: 5px;
            color: var(--neon);
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 20px;
            position: absolute;
            top: 40px;
        }

        #vc {
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
        }

        /* Control Panel Styles */
        .control-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #status-text {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--neon);
            text-align: center;
            text-transform: uppercase;
        }

        /* Custom Sliders (The White Pills) */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 2px;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 12px;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-wrap input[type=range] {
            flex: 1;
        }

        .time-label {
            font-size: 10px;
            color: var(--neon);
        }

        /* Layout Grid */
        .console-row {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            gap: 15px;
            height: 120px;
        }

        .slider-bundle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .v-track-container {
            width: 20px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vertical-slider {
            transform: rotate(-90deg);
            width: 80px !important;
        }

        .slider-label {
            font-size: 8px;
            letter-spacing: 1px;
            font-weight: bold;
            color: #fff;
        }

        /* Big Process Button */
        #btn-bypass {
            width: 100%;
            height: 60px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 0 0 25px var(--neon);
            text-transform: uppercase;
            cursor: pointer;
        }

        #btn-bypass.inactive {
            background: #111;
            color: #444;
            box-shadow: none;
            border: 1px solid #222;
        }

        .bypass-label {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--neon);
            margin-top: 5px;
        }

        .contour-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* Transport Grid */
        .transport-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }

        .transport-grid button {
            background: transparent;
            border: 1px solid #333;
            color: var(--neon);
            padding: 12px 0;
            font-size: 10px;
            border-radius: 4px;
        }

        #btn-rec {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-header">
        <h1>DEPTH<span>IMPACT</span> HYBRID</h1>
        <button class="hdr-btn" id="btn-library">≡ LIBRARY</button>
    </div>

    <div class="main-interface">
        <div class="sphere-label">IMMERSION SPHERE</div>
        <canvas id="vc"></canvas>
        <div id="now-playing" style="font-size: 8px; color: var(--neon); margin-top: 15px; opacity: 0.5;">—</div>
    </div>

    <div class="control-panel">
        <div id="status-text">LOAD A FILE · PRESS PLAY</div>

        <div class="progress-wrap">
            <input type="range" id="seek-bar" min="0" max="1000" value="0">
            <span class="time-label">0:00</span>
        </div>

        <div class="console-row">
            <div class="slider-bundle">
                <div class="v-track-container">
                    <input type="range" class="vertical-slider" id="clarity" min="0" max="100" value="50">
                </div>
                <span class="slider-label">CLARITY</span>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <button id="btn-bypass">PROCESS<br>ON</button>
                <span class="bypass-label">BYPASS</span>
            </div>

            <div class="slider-bundle">
                <div class="v-track-container">
                    <input type="range" class="vertical-slider" id="depth" min="0" max="100" value="50">
                </div>
                <span class="slider-label">DEPTH</span>
            </div>
        </div>

        <div class="contour-row">
            <span class="slider-label">LO CONTOUR</span>
            <input type="range" style="width: 100%;" id="contour" min="0" max="100" value="20">
        </div>

        <div class="transport-grid">
            <button id="btn-prev">|◀</button>
            <button id="btn-rw">« RW</button>
            <button id="btn-play">▶ PLAY</button>
            <button id="btn-stop">■ STOP</button>
            <button id="btn-ff">FF »</button>
            <button id="btn-next">▶|</button>
        </div>

        <button id="btn-rec">● REC MP3</button>
    </div>
</div>

<script>
    // Note: You would keep your original WebAudio and Canvas logic here.
    // I have updated the sizing below to fit the new arched interface.

    const canvas = document.getElementById('vc');
    const ctx = canvas.getContext('2d');
    let SIZE = 240; 
    canvas.width = SIZE; canvas.height = SIZE;
    
    // Simple placeholder draw for the sphere logic
    function drawSphere() {
        ctx.clearRect(0,0,SIZE,SIZE);
        ctx.beginPath();
        ctx.arc(SIZE/2, SIZE/2, SIZE/2 - 5, 0, Math.PI*2);
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Add your complex geodesic/star logic back here
        requestAnimationFrame(drawSphere);
    }
    drawSphere();
</script>

</body>
</html>
