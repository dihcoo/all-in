<script>
"use strict";

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('vc');
const SIZE   = Math.min(Math.round(window.innerWidth * 0.72), 240);
canvas.width = SIZE; canvas.height = SIZE;
canvas.style.width = SIZE+'px'; canvas.style.height = SIZE+'px';
const ctx = canvas.getContext('2d');
const CX = SIZE/2, CY = SIZE/2, R = SIZE * 0.455;

// ── Audio state ───────────────────────────────────────────────────────────────
let audioCtx=null, analyser=null, sourceNode=null;
let loFilter, hiFilter, delayNode, delayGain, dryGain, masterGain;
let scriptProc=null, lameMp3Enc=null, mp3Chunks=[];
let isProcessing=true, isRecording=false, audioReady=false;

const audioEl    = document.getElementById('audio-el');
const bypassBtn  = document.getElementById('btn-bypass');
const statusEl   = document.getElementById('status-text');
const seekBar    = document.getElementById('seek-bar');
const timeLbl    = document.getElementById('time-display');
const nowPlaying = document.getElementById('now-playing');

// ── Playlist state ────────────────────────────────────────────────────────────
let playlist    = [];   // [{ name, url, duration }]
let currentIdx  = -1;
let durations   = {};   // url → formatted duration string

// ── Geodesic sphere ───────────────────────────────────────────────────────────
const LAT_DIVS=10, LON_DIVS=20;
const NODES=[], EDGES=[];
for (let li=0; li<=LAT_DIVS; li++) {
    const frac=li/LAT_DIVS, lat=-Math.PI/2+Math.PI*frac;
    const type=frac<0.33?'lo':frac>0.66?'hi':'mid';
    const fi=type==='lo'?Math.floor(Math.random()*5):type==='hi'?19+Math.floor(Math.random()*37):5+Math.floor(Math.random()*14);
    const cnt=Math.max(1,Math.round(LON_DIVS*Math.cos(lat)));
    for (let lj=0;lj<cnt;lj++) NODES.push({lat,lon:2*Math.PI*lj/cnt+(li%2?0.18:0),type,fi});
}
for (let a=0;a<NODES.length;a++) for (let b=a+1;b<NODES.length;b++) {
    const na=NODES[a],nb=NODES[b],dlat=na.lat-nb.lat;
    let dlon=Math.abs(na.lon-nb.lon); if(dlon>Math.PI)dlon=2*Math.PI-dlon;
    if(Math.sqrt(dlat*dlat+(dlon*Math.cos((na.lat+nb.lat)/2))**2)<0.40) EDGES.push([a,b]);
}

// ── Celestial star system ─────────────────────────────────────────────────────
const STAR_BANDS=[...Array(18).fill('lo'),...Array(16).fill('mid'),...Array(18).fill('hi')];
const STARS=STAR_BANDS.map(band=>{
    const orbitR=0.13+Math.random()*0.68;
    const dir=Math.random()<0.3?-1:1;
    const speed=dir*(0.055+Math.random()*0.20)/Math.sqrt(orbitR);
    const inclBase=band==='lo'?(Math.random()-0.5)*0.55:band==='hi'?Math.PI*0.5+(Math.random()-0.5)*0.7:(Math.random()-0.5)*Math.PI;
    const ecc=Math.random()*0.42;
    const fi=band==='lo'?Math.floor(Math.random()*5):band==='hi'?19+Math.floor(Math.random()*35):5+Math.floor(Math.random()*14);
    return {
        band,fi,hue:band,orbitR,speed,inclBase,
        ascNode0:Math.random()*Math.PI*2,
        precRate:(Math.random()-0.5)*0.012,
        wobbleAmp:0.02+Math.random()*0.08,
        wobbleSpd:0.008+Math.random()*0.025,
        wobblePhs:Math.random()*Math.PI*2,
        ecc,phase:Math.random()*Math.PI*2,
        size:0.10+Math.random()*0.48*(1-orbitR*0.3),
        basOp:0.20+Math.random()*0.50,
        twinkleSpeed:0.5+Math.random()*2.5,
        twinkleAmp:0.08+Math.random()*0.28,
        twinklePhase:Math.random()*Math.PI*2,
        trailLen:3+Math.floor(Math.random()*5),
        trailDt:0.18+Math.random()*0.25,
    };
});

function getStarPos(s,t,timeOffset){
    const tEval=t-(timeOffset||0);
    const ascNode=s.ascNode0+s.precRate*tEval;
    const incl=s.inclBase+s.wobbleAmp*Math.sin(s.wobbleSpd*tEval+s.wobblePhs);
    const M=s.phase+s.speed*tEval;
    const E=M+s.ecc*Math.sin(M);
    const trueA=2*Math.atan2(Math.sqrt(1+s.ecc)*Math.sin(E/2),Math.sqrt(1-s.ecc)*Math.cos(E/2));
    const r=Math.min(s.orbitR*R*(1-s.ecc*s.ecc)/(1+s.ecc*Math.cos(trueA)),R*0.87);
    const xOrb=r*Math.cos(trueA),yOrb=r*Math.sin(trueA);
    const cosI=Math.cos(incl),sinI=Math.sin(incl),cosN=Math.cos(ascNode),sinN=Math.sin(ascNode);
    return{sx:CX+cosN*xOrb-sinN*yOrb*cosI,sy:CY-(sinN*xOrb+cosN*yOrb*cosI),depth:(yOrb*sinI)/R};
}

function proj(lat,lon,rotY){
    const cl=Math.cos(lat),sl=Math.sin(lat),co=Math.cos(lon+rotY),so=Math.sin(lon+rotY);
    return{x:CX+cl*so*R,y:CY-sl*R,z:cl*co};
}

// ── Audio graph ───────────────────────────────────────────────────────────────
function buildAudioGraph(){
    if(audioReady)return true;
    try{
        audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
        analyser=audioCtx.createAnalyser(); analyser.fftSize=128; analyser.smoothingTimeConstant=0.78;
        sourceNode=audioCtx.createMediaElementSource(audioEl);
        loFilter=audioCtx.createBiquadFilter(); loFilter.type='lowshelf'; loFilter.frequency.value=150; loFilter.gain.value=0;
        hiFilter=audioCtx.createBiquadFilter(); hiFilter.type='highshelf'; hiFilter.frequency.value=3000; hiFilter.gain.value=0;
        delayNode=audioCtx.createDelay(1.0); delayNode.delayTime.value=0.06;
        delayGain=audioCtx.createGain(); delayGain.gain.value=0;
        dryGain=audioCtx.createGain(); dryGain.gain.value=1;
        masterGain=audioCtx.createGain(); masterGain.gain.value=1;
        sourceNode.connect(loFilter); loFilter.connect(hiFilter);
        hiFilter.connect(dryGain); dryGain.connect(masterGain);
        hiFilter.connect(delayNode); delayNode.connect(delayGain); delayGain.connect(masterGain);
        masterGain.connect(analyser); analyser.connect(audioCtx.destination);
        try{
            scriptProc=audioCtx.createScriptProcessor(4096,2,2);
            const sink=audioCtx.createGain(); sink.gain.value=0;
            masterGain.connect(scriptProc); scriptProc.connect(sink); sink.connect(audioCtx.destination);
            scriptProc.onaudioprocess=function(e){
                if(!isRecording||!lameMp3Enc)return;
                const buf=lameMp3Enc.encodeBuffer(floatTo16(e.inputBuffer.getChannelData(0)),floatTo16(e.inputBuffer.getChannelData(1)));
                if(buf.length>0)mp3Chunks.push(new Int8Array(buf));
            };
        }catch(e){console.warn('ScriptProcessor N/A',e);}
        audioReady=true; return true;
    }catch(e){console.error('AudioCtx failed',e);setStatus('AUDIO ENGINE ERROR');return false;}
}

function floatTo16(buf){
    const CEIL=0.9886,out=new Int16Array(buf.length);
    for(let i=0;i<buf.length;i++){const s=Math.max(-CEIL,Math.min(CEIL,buf[i]));out[i]=s<0?s*0x8000:s*0x7FFF;}
    return out;
}
function resumeCtx(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}

// ── Playlist management ───────────────────────────────────────────────────────
const AUDIO_EXTS=/\.(mp3|m4a|wav|flac|ogg|aac|opus|weba|webm)$/i;

function addFiles(files){
    const filtered=[...files].filter(f=>AUDIO_EXTS.test(f.name)||f.type.startsWith('audio/'));
    filtered.forEach(f=>{
        const url=URL.createObjectURL(f);
        const name=f.name.replace(/\.[^.]+$/,''); // strip extension
        playlist.push({name,url,file:f});
        probeDuration(url,playlist.length-1);
    });
    renderPlaylist();
    if(currentIdx===-1&&playlist.length>0) loadTrack(0,false);
}

function probeDuration(url,idx){
    // Probe duration by loading into a temp audio element
    const tmp=new Audio();
    tmp.src=url;
    tmp.onloadedmetadata=()=>{
        durations[url]=fmt(tmp.currentTime===0?tmp.duration:tmp.duration);
        // update just that row
        const items=document.querySelectorAll('.track-item');
        if(items[idx]){
            const d=items[idx].querySelector('.track-dur');
            if(d)d.textContent=durations[url]||'—';
        }
    };
}

function loadTrack(idx,autoplay){
    if(idx<0||idx>=playlist.length)return;
    currentIdx=idx;
    const track=playlist[idx];
    audioEl.src=track.url;
    audioEl.load();
    nowPlaying.textContent=track.name;
    setStatus('LOADED: '+(track.name.length>22?track.name.slice(0,19)+'…':track.name).toUpperCase());
    seekBar.value=0; timeLbl.textContent='0:00';
    renderPlaylist();
    if(autoplay){
        if(!audioReady&&!buildAudioGraph())return;
        resumeCtx();
        audioEl.play().then(()=>setStatus(isProcessing?'PROCESSING':'BYPASSED')).catch(e=>setStatus('PLAYBACK BLOCKED'));
    }
}

function renderPlaylist(){
    const list=document.getElementById('track-list');
    const empty=document.getElementById('empty-state');
    const count=document.getElementById('drawer-count');
    count.textContent=playlist.length+' TRACK'+(playlist.length!==1?'S':'');
    if(!playlist.length){empty.style.display='block';list.innerHTML='';list.appendChild(empty);return;}
    empty.style.display='none';
    list.innerHTML='';
    playlist.forEach((t,i)=>{
        const div=document.createElement('div');
        div.className='track-item'+(i===currentIdx?' active':'');
        div.innerHTML=`
            <span class="track-num">${String(i+1).padStart(2,'0')}</span>
            <span class="track-name">${escHtml(t.name)}</span>
            <span class="track-playing">${i===currentIdx?'<div class="bars"><span></span><span></span><span></span></div>':''}</span>
            <span class="track-dur">${durations[t.url]||'—'}</span>`;
        div.addEventListener('click',()=>{loadTrack(i,true);});
        list.appendChild(div);
    });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── File / folder loading ─────────────────────────────────────────────────────
function handleFileInput(input){
    input.addEventListener('change',function(e){
        addFiles(e.target.files); this.value='';
    });
}
handleFileInput(document.getElementById('audio-upload'));
handleFileInput(document.getElementById('drawer-upload'));

async function openFolder(){
    if(window.showDirectoryPicker){
        try{
            const dir=await window.showDirectoryPicker({mode:'read'});
            const files=[];
            for await(const entry of dir.values()){
                if(entry.kind==='file'&&AUDIO_EXTS.test(entry.name)){
                    const f=await entry.getFile(); files.push(f);
                }
            }
            files.sort((a,b)=>a.name.localeCompare(b.name));
            addFiles(files);
            setStatus(files.length+' FILES LOADED');
        }catch(e){if(e.name!=='AbortError')setStatus('FOLDER ACCESS DENIED');}
    }else{
        // Fallback: webkitdirectory for older Chrome/Android
        const inp=document.createElement('input');
        inp.type='file'; inp.multiple=true; inp.webkitdirectory=true;
        inp.accept='audio/*';
        inp.onchange=e=>{addFiles(e.target.files);};
        inp.click();
    }
}
document.getElementById('btn-folder').addEventListener('click',openFolder);
document.getElementById('drawer-folder-btn').addEventListener('click',openFolder);

// ── Transport ─────────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',function(){
    if(!audioEl.src||audioEl.src===window.location.href){
        if(playlist.length>0)loadTrack(0,true);
        else setStatus('LOAD A FILE FIRST');
        return;
    }
    if(!audioReady&&!buildAudioGraph())return;
    resumeCtx();
    audioEl.play()
        .then(()=>setStatus(isProcessing?'PROCESSING':'BYPASSED'))
        .catch(e=>{console.error(e);setStatus('PLAYBACK BLOCKED');});
});
document.getElementById('btn-stop').addEventListener('click',()=>{audioEl.pause();audioEl.currentTime=0;setStatus('STOPPED');});
document.getElementById('btn-rw').addEventListener('click',()=>{if(audioEl.readyState)audioEl.currentTime=Math.max(0,audioEl.currentTime-5);});
document.getElementById('btn-ff').addEventListener('click',()=>{if(audioEl.readyState)audioEl.currentTime=Math.min(audioEl.duration||0,audioEl.currentTime+5);});
document.getElementById('btn-prev').addEventListener('click',()=>{
    if(currentIdx>0)loadTrack(currentIdx-1,!audioEl.paused);
    else if(playlist.length>0)loadTrack(playlist.length-1,!audioEl.paused);
});
document.getElementById('btn-next').addEventListener('click',()=>{
    if(currentIdx<playlist.length-1)loadTrack(currentIdx+1,!audioEl.paused);
    else if(playlist.length>0)loadTrack(0,!audioEl.paused);
});

// Auto-advance when track ends
audioEl.addEventListener('ended',()=>{
    if(currentIdx<playlist.length-1)loadTrack(currentIdx+1,true);
    else{setStatus('PLAYLIST COMPLETE');seekBar.value=0;}
});

// ── Seek ──────────────────────────────────────────────────────────────────────
let seeking=false;
seekBar.addEventListener('touchstart',()=>{seeking=true;},{passive:true});
seekBar.addEventListener('mousedown', ()=>{seeking=true;});
seekBar.addEventListener('input', ()=>{if(audioEl.duration)audioEl.currentTime=(seekBar.value/1000)*audioEl.duration;});
seekBar.addEventListener('change',()=>{seeking=false;});
audioEl.addEventListener('timeupdate',()=>{
    if(!seeking&&audioEl.duration){seekBar.value=(audioEl.currentTime/audioEl.duration)*1000;timeLbl.textContent=fmt(audioEl.currentTime);}
});
function fmt(s){return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

// ── Bypass ────────────────────────────────────────────────────────────────────
bypassBtn.addEventListener('click',()=>{
    isProcessing=!isProcessing;
    if(audioReady){
        loFilter.gain.value=isProcessing?(document.getElementById('contour').value/100)*25:0;
        hiFilter.gain.value=isProcessing?(document.getElementById('clarity').value/100)*25:0;
        if(!isProcessing)delayGain.gain.value=0;
    }
    bypassBtn.innerHTML=isProcessing?'PROCESS<br>ON':'PROCESS<br>OFF';
    bypassBtn.className=isProcessing?'active':'inactive';
    setStatus(isProcessing?'PROCESSING':'BYPASSED');
});

document.getElementById('clarity').addEventListener('input',function(){if(hiFilter&&isProcessing)hiFilter.gain.value=(this.value/100)*25;});
document.getElementById('depth').addEventListener('input',function(){if(delayGain&&isProcessing)delayGain.gain.value=(this.value/100)*0.8;});
document.getElementById('contour').addEventListener('input',function(){if(loFilter&&isProcessing)loFilter.gain.value=(this.value/100)*25;});

// ── Recording ─────────────────────────────────────────────────────────────────
const recBtn=document.getElementById('btn-rec');
recBtn.addEventListener('click',function(){
    if(!audioReady){setStatus('PRESS PLAY FIRST');return;}
    if(!isRecording){
        if(typeof lamejs==='undefined'){setStatus('MP3 LIB LOADING…');return;}
        lameMp3Enc=new lamejs.Mp3Encoder(2,audioCtx.sampleRate,128);
        mp3Chunks=[];
        isRecording=true;
        this.textContent='■ STOP REC';
        this.classList.add('recording');
        setStatus('RECORDING MP3…');
    }else{
        isRecording=false;
        this.textContent='● REC MP3';
        this.classList.remove('recording');
        if(lameMp3Enc){const fl=lameMp3Enc.flush();if(fl.length>0)mp3Chunks.push(new Int8Array(fl));}
        saveMp3();
    }
});
function saveMp3(){
    if(!mp3Chunks.length){setStatus('NOTHING RECORDED');return;}
    const blob=new Blob(mp3Chunks,{type:'audio/mp3'});
    const url=URL.createObjectURL(blob);
    const a=Object.assign(document.createElement('a'),{href:url,download:'ImpactMix.mp3'});
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),8000);
    setStatus('MP3 SAVED ✓');
}

// ── Playlist drawer ───────────────────────────────────────────────────────────
const drawer  =document.getElementById('playlist-drawer');
const overlay =document.getElementById('drawer-overlay');
function openDrawer() { drawer.classList.add('open'); overlay.classList.add('visible'); }
function closeDrawer(){ drawer.classList.remove('open'); overlay.classList.remove('visible'); }
document.getElementById('btn-playlist-toggle').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(msg){statusEl.textContent=msg;}

// ── Draw loop ─────────────────────────────────────────────────────────────────
function draw(){
    requestAnimationFrame(draw);
    const bins=analyser?analyser.frequencyBinCount:64;
    const freq=new Uint8Array(bins);
    if(analyser)analyser.getByteFrequencyData(freq);
    const clarityVal=document.getElementById('clarity').value/100;
    const depthVal  =document.getElementById('depth').value/100;
    const contourVal=document.getElementById('contour').value/100;

    ctx.clearRect(0,0,SIZE,SIZE);
    const bg=ctx.createRadialGradient(CX,CY*0.85,0,CX,CY,R*1.05);
    bg.addColorStop(0,'rgba(4,28,22,1)');bg.addColorStop(0.5,'rgba(2,14,12,1)');bg.addColorStop(1,'rgba(0,4,8,1)');
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

    ctx.save();ctx.beginPath();ctx.arc(CX,CY,R-0.5,0,Math.PI*2);ctx.clip();

    // Stars
    const t=Date.now()/1000;
    STARS.forEach(s=>{
        const rawFreq=freq[Math.min(s.fi,bins-1)]/255;
        const sliderBoost=s.band==='lo'?contourVal*0.6:s.band==='hi'?clarityVal*0.6:depthVal*0.4;
        const energy=Math.min(1,rawFreq+sliderBoost);
        let cr,cg,cb;
        if(s.hue==='lo'){cr=0;cg=210;cb=140;}else if(s.hue==='hi'){cr=170;cg=235;cb=255;}else{cr=0;cg=255;cb=215;}
        const bloom=energy*0.68;
        const r=Math.round(cr+(255-cr)*bloom),g=Math.round(cg+(255-cg)*bloom*0.45),b=Math.round(cb+(255-cb)*bloom*0.25);
        // Trails
        for(let step=s.trailLen;step>=1;step--){
            const ghost=getStarPos(s,t,step*s.trailDt);
            if(ghost.depth<-0.05)continue;
            const gd=0.28+0.72*((ghost.depth+1)/2);
            const fade=1-step/(s.trailLen+1);
            ctx.beginPath();ctx.arc(ghost.sx,ghost.sy,Math.max(0.1,s.size*0.55*fade*gd),0,Math.PI*2);
            ctx.fillStyle=`rgba(${cr},${cg},${cb},${fade*0.18*gd*(0.4+energy*0.5)})`;ctx.fill();
        }
        const pos=getStarPos(s,t);
        if(pos.depth<-0.08)return;
        const da=0.28+0.72*((pos.depth+1)/2),ds=0.50+0.50*((pos.depth+1)/2);
        const tw=1+(s.twinkleAmp+energy*0.22)*Math.sin(t*s.twinkleSpeed+s.twinklePhase);
        const alpha=Math.min(1,(s.basOp+energy*0.45)*da*tw);
        const radius=(s.size+energy*1.1)*ds;
        const haloR=Math.max(radius*2.5,radius*2.5+energy*4.5);
        if(alpha>0.08){
            const glow=ctx.createRadialGradient(pos.sx,pos.sy,0,pos.sx,pos.sy,haloR);
            glow.addColorStop(0,`rgba(${r},${g},${b},${alpha*(0.28+energy*0.38)})`);
            glow.addColorStop(0.5,`rgba(${cr},${cg},${cb},${alpha*0.05})`);
            glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath();ctx.arc(pos.sx,pos.sy,haloR,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
        }
        ctx.beginPath();ctx.arc(pos.sx,pos.sy,Math.max(0.18,radius),0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,alpha)})`;ctx.fill();
    });

    const rotY=(Date.now()/1000)*0.16;
    const P=NODES.map(n=>proj(n.lat,n.lon,rotY));

    // Edges
    const edgeSorted=EDGES.map(([a,b])=>({a,b,pa:P[a],pb:P[b],midZ:(P[a].z+P[b].z)/2})).sort((x,y)=>x.midZ-y.midZ);
    edgeSorted.forEach(({a,b,pa,pb,midZ})=>{
        if(pa.z<0.0&&pb.z<0.0)return;
        const vis=Math.min(1,Math.max(0,midZ+0.18)*3.5);if(vis<=0)return;
        const na=NODES[a],nb=NODES[b];
        const e=(freq[Math.min(na.fi,bins-1)]+freq[Math.min(nb.fi,bins-1)])/(2*255);
        const[r,g,b2]=na.type==='lo'?[0,200,155]:na.type==='hi'?[160,245,255]:[0,255,215];
        ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
        ctx.strokeStyle=`rgba(${r},${g},${b2},${Math.min(0.55,(0.04+e*0.38)*vis)})`;
        ctx.lineWidth=0.4+e*0.85;ctx.stroke();
    });

    // Nodes
    NODES.forEach((n,i)=>{
        const p=P[i];if(p.z<-0.12)return;
        const rawV=freq[Math.min(n.fi,bins-1)]/255;
        const boost=n.type==='lo'?contourVal*0.55:n.type==='hi'?clarityVal*0.55:depthVal*0.35;
        const energy=Math.min(1,rawV+boost);
        const vis=Math.max(0,p.z+0.18);
        const dotR=Math.max(0.3,(0.8+energy*3.8)*vis);
        const[cr,cg,cb]=n.type==='lo'?[0,210,140]:n.type==='hi'?[170,240,255]:[0,255,210];
        if(energy>0.06){
            const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,dotR*5);
            glow.addColorStop(0,`rgba(${cr},${cg},${cb},${energy*0.55*vis})`);
            glow.addColorStop(0.4,`rgba(${cr},${cg},${cb},${energy*0.12*vis})`);
            glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath();ctx.arc(p.x,p.y,dotR*5,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
        }
        const wm=energy*0.85;
        ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);
        ctx.fillStyle=`rgba(${Math.round(cr+(255-cr)*wm)},${Math.round(cg+(255-cg)*wm*0.4)},${Math.round(cb+(255-cb)*wm*0.25)},${Math.min(1,0.45+energy*0.75)*vis})`;
        ctx.fill();
    });

    ctx.restore();
    const spec=ctx.createRadialGradient(CX-R*0.38,CY-R*0.38,0,CX,CY,R);
    spec.addColorStop(0,'rgba(0,255,200,0.08)');spec.addColorStop(0.55,'rgba(0,255,200,0.01)');spec.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=spec;ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,204,0.32)';ctx.lineWidth=1.8;ctx.stroke();
}

draw();

// ── Anti-jog ──────────────────────────────────────────────────────────────────
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
