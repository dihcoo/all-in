<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DepthImpact Hybrid - V2</title>
<style>
:root {
    --neon:#00ffcc; --neon-dim:rgba(0,255,204,0.25);
    --bg:#000000; --panel:#0d0d10; --red:#ff0033; --white:#ffffff;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

body {
    background:var(--bg); color:rgba(220,255,248,0.9);
    font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;
    height:100dvh; width:100vw; overflow:hidden;
    display:flex; justify-content:center; align-items:center;
}

#sky-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── App Shell ── */
.app-container {
    width:100%; max-width:480px; height:100dvh;
    display:flex; flex-direction:column;
    position:relative; z-index:1; background:black;
}

/* ── Header ── */
.top-header {
    padding:15px 12px; background:#000;
    display:flex; align-items:center; justify-content:center;
    position:relative; flex-shrink:0;
}
.top-header h1 {
    font-size:0.9rem; letter-spacing:5px; text-transform:uppercase; font-weight:800;
    color:#fff; text-align:center;
}
.top-header h1 span { color:var(--neon); }
.hdr-btn {
    position:absolute; right:12px; font-size:8px; letter-spacing:1px;
    color:var(--neon); border:1px solid rgba(0,255,204,0.3);
    background:transparent; padding:5px 8px; border-radius:4px; font-weight:700;
}

/* ── The Dome ── */
.main-interface {
    flex:1.2; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at center, #0a1818 0%, #000 100%);
    border-radius: 50% 50% 0 0 / 20% 20% 0 0;
    border-top: 1px solid rgba(0,255,204,0.15);
    position:relative; overflow:hidden;
}
.sphere-label {
    position:absolute; top:35px; font-size:8px; letter-spacing:4px;
    color:var(--neon); text-transform:uppercase; opacity:0.6;
}
#vc { border-radius:50%; touch-action:none; }
.now-playing {
    font-size:8px; letter-spacing:1px; color:var(--neon); margin-top:15px;
    opacity:0.6; max-width:80%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}

/* ── Control Panel ── */
.control-panel {
    background:#000; padding:15px 20px 25px;
    display:flex; flex-direction:column; gap:12px; flex-shrink:0;
}
#status-text {
    font-size:9px; letter-spacing:3px; color:var(--neon);
    text-align:center; text-transform:uppercase; margin-bottom:5px;
}

/* ── Custom Pill Sliders ── */
input[type=range] { -webkit-appearance:none; background:rgba(255,255,255,0.15); height:2px; }
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; height:22px; width:12px;
    background:#fff; border-radius:6px; cursor:pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
}

.progress-wrap { display:flex; align-items:center; gap:10px; }
.progress-wrap input { flex:1; }
.time-label { font-size:9px; color:var(--neon); min-width:30px; text-align:right; opacity:0.7; }

.console-row {
    display:grid; grid-template-columns:1fr 1.4fr 1fr;
    align-items:center; gap:15px; margin:10px 0;
}
.slider-bundle { display:flex; flex-direction:column; align-items:center; gap:8px; }
.v-track { width:20px; height:80px; display:flex; align-items:center; justify-content:center; }
.v-track input { transform:rotate(-90deg); width:80px; }
.slider-label { font-size:7px; font-weight:800; letter-spacing:1.5px; color:#fff; text-transform:uppercase; }

/* ── Process Button ── */
#btn-bypass {
    width:100%; height:55px; background:var(--neon); color:#000;
    border:none; border-radius:8px; font-weight:900; font-size:10px;
    letter-spacing:1px; box-shadow:0 0 20px var(--neon); cursor:pointer;
}
#btn-bypass.inactive { background:#111; color:#444; box-shadow:none; border:1px solid #222; }
.bypass-sub { font-size:7px; letter-spacing:2px; color:var(--neon); margin-top:4px; font-weight:700; }

.transport-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
.transport-grid button {
    background:transparent; border:1px solid #222; color:var(--neon);
    padding:12px 0; font-size:9px; border-radius:4px; font-weight:700;
}
#btn-rec {
    width:100%; background:transparent; border:1px solid #222;
    color:#fff; padding:12px; font-size:9px; border-radius:4px; letter-spacing:1px;
}
.recording { background:var(--red)!important; border-color:var(--red)!important; animation:blink 0.9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Playlist Drawer ── */
.playlist-drawer {
    position:absolute; inset:0; top:60px; background:#050508;
    z-index:100; transform:translateY(100%); transition:transform 0.3s ease;
    display:flex; flex-direction:column;
}
.playlist-drawer.open { transform:translateY(0); }
.drawer-header { padding:15px; border-bottom:1px solid #1a1a1a; display:flex; justify-content:space-between; align-items:center; }
.track-list { flex:1; overflow-y:auto; padding:10px; }
.track-item { padding:12px; border-bottom:1px solid #111; font-size:10px; color:#888; display:flex; justify-content:space-between; }
.track-item.active { color:var(--neon); background:rgba(0,255,204,0.05); }

</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>

<div class="app-container">
    <div class="top-header">
        <h1>DEPTH<span>IMPACT</span> HYBRID</h1>
        <button class="hdr-btn" id="btn-library">≡ LIBRARY</button>
    </div>

    <div class="main-interface">
        <div class="sphere-label">IMMERSION SPHERE</div>
        <canvas id="vc"></canvas>
        <div class="now-playing" id="now-playing">—</div>
    </div>

    <div class="control-panel">
        <div id="status-text">LOAD A FILE · PRESS PLAY</div>

        <div class="progress-wrap">
            <input type="range" id="seek-bar" min="0" max="1000" value="0">
            <span class="time-label" id="time-display">0:00</span>
        </div>

        <div class="console-row">
            <div class="slider-bundle">
                <div class="v-track"><input type="range" id="clarity" min="0" max="100" value="0"></div>
                <span class="slider-label">CLARITY</span>
            </div>

            <div style="display:flex; flex-direction:column; align-items:center;">
                <button id="btn-bypass">PROCESS<br>ON</button>
                <span class="bypass-sub">BYPASS</span>
            </div>

            <div class="slider-bundle">
                <div class="v-track"><input type="range" id="depth" min="0" max="100" value="0"></div>
                <span class="slider-label">DEPTH</span>
            </div>
        </div>

        <div class="slider-bundle" style="width:100%;">
            <span class="slider-label">LO CONTOUR</span>
            <input type="range" id="contour" style="width:100%" min="0" max="100" value="0">
        </div>

        <div class="transport-grid">
            <button id="btn-prev">|◀</button>
            <button id="btn-rw">« RW</button>
            <button id="btn-play">▶ PLAY</button>
            <button id="btn-stop">■ STOP</button>
            <button id="btn-ff">FF »</button>
            <button id="btn-next">▶|</button>
        </div>

        <button id="btn-rec">● REC MP3</button>
    </div>

    <audio id="audio-el" preload="auto"></audio>
    <div class="playlist-drawer" id="playlist-drawer">
        <div class="drawer-header">
            <span style="font-size:10px; letter-spacing:2px; font-weight:800;">LIBRARY</span>
            <button class="hdr-btn" id="drawer-close" style="position:static">CLOSE</button>
        </div>
        <div style="padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <label class="hdr-btn" style="position:static; text-align:center; cursor:pointer;">⊕ ADD FILES<input type="file" id="audio-upload" multiple style="display:none"></label>
            <button class="hdr-btn" id="btn-clear" style="position:static; color:var(--red)">✕ CLEAR</button>
        </div>
        <div class="track-list" id="track-list"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<script>
"use strict";

// ── Sphere Canvas Setup ──
const canvas = document.getElementById('vc');
const ctx = canvas.getContext('2d');
let SIZE = 246;
canvas.width = SIZE; canvas.height = SIZE;
let CX = SIZE/2, CY = SIZE/2, R = SIZE * 0.45;

// ── Audio Core ──
let audioCtx, analyser, sourceNode, loFilter, hiFilter, delayNode, delayGain, dryGain, masterGain;
let playlist = [], currentIdx = -1, isProcessing = true, isRecording = false;
const audioEl = document.getElementById('audio-el');

// ── Geodesic / Star Geometry Logic (From your original script) ──
const LAT_DIVS=10, LON_DIVS=20, NODES=[], EDGES=[], STARS=[];
for(let li=0;li<=LAT_DIVS;li++){
    const frac=li/LAT_DIVS, lat=-Math.PI/2+Math.PI*frac;
    const cnt=Math.max(1,Math.round(LON_DIVS*Math.cos(lat)));
    for(let lj=0;lj<cnt;lj++) NODES.push({lat,lon:2*Math.PI*lj/cnt+(li%2?0.18:0), fi:Math.floor(Math.random()*64), type:frac<0.33?'lo':frac>0.66?'hi':'mid'});
}
for(let a=0;a<NODES.length;a++) for(let b=a+1;b<NODES.length;b++){
    let dlon=Math.abs(NODES[a].lon-NODES[b].lon); if(dlon>Math.PI)dlon=2*Math.PI-dlon;
    if(Math.sqrt((NODES[a].lat-NODES[b].lat)**2+(dlon*Math.cos((NODES[a].lat+NODES[b].lat)/2))**2)<0.4) EDGES.push([a,b]);
}
for(let i=0;i<50;i++) STARS.push({ orbitR:0.2+Math.random()*0.7, speed:(Math.random()-0.5)*0.1, phase:Math.random()*Math.PI*2, size:0.2+Math.random()*0.5, fi:Math.floor(Math.random()*64) });

function proj(lat,lon,rotY){
    const cl=Math.cos(lat), sl=Math.sin(lat), co=Math.cos(lon+rotY), so=Math.sin(lon+rotY);
    return { x:CX+cl*so*R, y:CY-sl*R, z:cl*co };
}

// ── Audio Engine Initialize ──
function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;
    sourceNode = audioCtx.createMediaElementSource(audioEl);
    loFilter = audioCtx.createBiquadFilter(); loFilter.type='lowshelf'; loFilter.frequency.value=150;
    hiFilter = audioCtx.createBiquadFilter(); hiFilter.type='highshelf'; hiFilter.frequency.value=3000;
    delayNode = audioCtx.createDelay(1.0); delayNode.delayTime.value=0.06;
    delayGain = audioCtx.createGain(); delayGain.gain.value=0;
    dryGain = audioCtx.createGain(); dryGain.gain.value=1;
    masterGain = audioCtx.createGain();
    sourceNode.connect(loFilter); loFilter.connect(hiFilter);
    hiFilter.connect(dryGain); dryGain.connect(masterGain);
    hiFilter.connect(delayNode); delayNode.connect(delayGain); delayGain.connect(masterGain);
    masterGain.connect(analyser); analyser.connect(audioCtx.destination);
}

// ── Interaction Listeners ──
document.getElementById('btn-play').onclick = () => { if(playlist.length > 0) { initAudio(); audioCtx.resume(); audioEl.play(); } };
document.getElementById('btn-stop').onclick = () => { audioEl.pause(); audioEl.currentTime = 0; };
document.getElementById('btn-bypass').onclick = function() {
    isProcessing = !isProcessing;
    this.className = isProcessing ? '' : 'inactive';
    this.innerHTML = isProcessing ? 'PROCESS<br>ON' : 'PROCESS<br>OFF';
    if(audioCtx) {
        loFilter.gain.value = isProcessing ? (document.getElementById('contour').value/100)*25 : 0;
        hiFilter.gain.value = isProcessing ? (document.getElementById('clarity').value/100)*25 : 0;
        delayGain.gain.value = isProcessing ? (document.getElementById('depth').value/100)*0.8 : 0;
    }
};

// ── Render Loop ──
function draw(){
    requestAnimationFrame(draw);
    const freq = new Uint8Array(analyser ? analyser.frequencyBinCount : 64);
    if(analyser) analyser.getByteFrequencyData(freq);
    
    ctx.clearRect(0,0,SIZE,SIZE);
    
    // Base Sphere Background
    const grad = ctx.createRadialGradient(CX,CY,0,CX,CY,R);
    grad.addColorStop(0,'#051515'); grad.addColorStop(1,'#000');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();

    const rotY = Date.now()/1000 * 0.2;
    const P = NODES.map(n => proj(n.lat, n.lon, rotY));

    // Draw Edges
    EDGES.forEach(([a,b]) => {
        if(P[a].z < 0 && P[b].z < 0) return;
        const e = (freq[NODES[a].fi] + freq[NODES[b].fi])/512;
        ctx.beginPath(); ctx.moveTo(P[a].x, P[a].y); ctx.lineTo(P[b].x, P[b].y);
        ctx.strokeStyle = `rgba(0,255,204,${0.1 + e*0.5})`;
        ctx.lineWidth = 0.5 + e; ctx.stroke();
    });

    // Rim Glow
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(0,255,204,0.3)'; ctx.lineWidth = 2; ctx.stroke();
}
draw();

// ── Midnight Sky (Background) ──
(function(){
    const sky = document.getElementById('sky-canvas');
    const sc = sky.getContext('2d');
    let sw, sh;
    function res(){ sw=sky.width=window.innerWidth; sh=sky.height=window.innerHeight; }
    window.onresize = res; res();
    function renderSky(){
        sc.fillStyle = '#000'; sc.fillRect(0,0,sw,sh);
        for(let i=0;i<100;i++){
            sc.fillStyle = `rgba(255,255,255,${Math.random()*0.3})`;
            sc.beginPath(); sc.arc(Math.random()*sw, Math.random()*sh, Math.random()*1, 0, Math.PI*2); sc.fill();
        }
        requestAnimationFrame(renderSky);
    }
    renderSky();
})();

// ── File Management ──
document.getElementById('audio-upload').onchange = (e) => {
    const files = Array.from(e.target.files);
    files.forEach(f => {
        const url = URL.createObjectURL(f);
        playlist.push({name: f.name, url});
    });
    renderPlaylist();
    if(currentIdx === -1) loadTrack(0);
};

function renderPlaylist(){
    const list = document.getElementById('track-list');
    list.innerHTML = playlist.map((t,i) => `<div class="track-item ${i===currentIdx?'active':''}" onclick="loadTrack(${i})"><span>${i+1}. ${t.name}</span></div>`).join('');
}

window.loadTrack = (idx) => {
    currentIdx = idx;
    audioEl.src = playlist[idx].url;
    document.getElementById('now-playing').textContent = playlist[idx].name;
    renderPlaylist();
};

document.getElementById('btn-library').onclick = () => document.getElementById('playlist-drawer').classList.add('open');
document.getElementById('drawer-close').onclick = () => document.getElementById('playlist-drawer').classList.remove('open');

// ── Progress & Seek ──
audioEl.ontimeupdate = () => {
    if(!audioEl.duration) return;
    const seek = document.getElementById('seek-bar');
    seek.value = (audioEl.currentTime / audioEl.duration) * 1000;
    const m = Math.floor(audioEl.currentTime/60), s = Math.floor(audioEl.currentTime%60);
    document.getElementById('time-display').textContent = `${m}:${s<10?'0':''}${s}`;
};
document.getElementById('seek-bar').oninput = function(){ audioEl.currentTime = (this.value/1000) * audioEl.duration; };

</script>
</body>
</html>
