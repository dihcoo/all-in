 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DepthImpact Hybrid</title>
<style>
:root {
    --neon:#00ffcc; --neon-dim:rgba(0,255,204,0.25);
    --bg:#060608; --panel:#0d0d10; --red:#ff0033; --midnight:#08080a;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

body{
    background:var(--midnight); color:rgba(220,255,248,0.9);
    font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;
    height:100dvh; width:100vw; overflow:hidden;
    display:flex; justify-content:center; align-items:stretch;
    overscroll-behavior:none; touch-action:pan-x pan-y;
    position:relative;
}

/* ── Midnight sky starfield (behind app container) ── */
#sky-canvas{
    position:fixed; inset:0;
    width:100vw; height:100dvh;
    pointer-events:none; z-index:0;
    display:block;
}

/* ═══════════════════════════════════════════
APP SHELL — portrait default
═══════════════════════════════════════════ */
.app-container{
    background:var(--panel);
    width:100%; max-width:480px;
    display:flex; flex-direction:column;
    position:relative;
    z-index:1;
    transition:max-width 0.3s;
    box-shadow: 0 0 60px rgba(0,8,20,0.85), 0 0 1px rgba(0,255,204,0.06);
    /* Force all descendant text away from Safari’s default blue */
    color:rgba(220,255,248,0.92); -webkit-text-fill-color:rgba(220,255,248,0.92);
}

/* ── Header ── */
.top-header{
    padding:10px 12px 8px; background:#080808;
    border-bottom:1.5px solid var(--neon);
    flex-shrink:0; display:flex;
    align-items:center; justify-content:space-between;
    gap:8px; color:rgba(220,255,248,0.92); -webkit-text-fill-color:rgba(220,255,248,0.92);
}
.top-header h1{
    font-size:0.85rem; letter-spacing:5px;
    text-transform:uppercase; font-weight:800;
    flex:1; text-align:center; white-space:nowrap;
    color:rgba(232,255,250,0.95); -webkit-text-fill-color:rgba(232,255,250,0.95);
}
.top-header h1 span{ color:var(--neon); }
.hdr-btn{
    font-size:8px; letter-spacing:1px; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    border:1px solid rgba(0,255,204,0.35); background:transparent;
    padding:5px 7px; border-radius:4px; cursor:pointer;
    white-space:nowrap; flex-shrink:0; font-weight:700;
    transition:background 0.15s, color 0.15s;
    -webkit-appearance:none; appearance:none;
}
.hdr-btn:active{ background:rgba(0,255,204,0.12); }

/* ── Globe area ── */
.main-interface{
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:4px 8px; min-height:0;
    background:var(--panel);
}
.sphere-label{
    font-size:8px; letter-spacing:4px; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    text-transform:uppercase; opacity:0.65; margin-bottom:5px;
}
.globe-wrapper{
    position:relative; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
}
.globe-ring-outer{
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,255,204,0.12);
    box-shadow:0 0 35px rgba(0,255,204,0.07),inset 0 0 35px rgba(0,255,204,0.03);
    pointer-events:none;
    top:-14px; left:-14px; right:-14px; bottom:-14px;
}
.globe-ring-inner{
    position:absolute; border-radius:50%;
    border:1.5px solid rgba(0,255,204,0.32);
    box-shadow:0 0 20px rgba(0,255,204,0.18),inset 0 0 20px rgba(0,255,204,0.05);
    pointer-events:none;
    top:-5px; left:-5px; right:-5px; bottom:-5px;
}
canvas{
    display:block; border-radius:50%;
    touch-action:none; user-select:none; -webkit-user-select:none;
}
.now-playing{
    font-size:8px; letter-spacing:1.5px; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    text-align:center; opacity:0.75; margin-top:4px;
    max-width:90%; overflow:hidden;
    white-space:nowrap; text-overflow:ellipsis; min-height:12px;
    background:var(--panel);
}

/* ── Control panel ── */
.control-panel{
    background:#0d0d10; padding:8px 14px 12px;
    border-top:1px solid #1a1a1a; flex-shrink:0;
    color:rgba(220,255,248,0.92); -webkit-text-fill-color:rgba(220,255,248,0.92);
}
#status-text{
    font-size:8px; letter-spacing:3px; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    margin-bottom:7px; text-align:center; text-transform:uppercase;
    opacity:0.8; min-height:12px;
}
.console-row{
    display:grid; grid-template-columns:1fr 1.2fr 1fr;
    gap:8px; align-items:center; margin-bottom:10px;
}
.slider-bundle{ display:flex; flex-direction:column; align-items:center; gap:5px; }
.slider-label{
    font-size:7px; font-weight:700; letter-spacing:1.5px;
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    text-transform:uppercase; text-align:center; opacity:0.85;
}
.vertical-track{
    width:90px; height:24px; display:flex;
    align-items:center; justify-content:center; transform:rotate(-90deg);
}
.vertical-track input[type=range]{ width:90px; height:18px; accent-color:var(--neon); cursor:pointer; touch-action:none; }
input[type=range].horizontal{ width:100%; height:20px; accent-color:var(--neon); cursor:pointer; }
#btn-bypass{
    width:100%; height:48px; font-size:8px; font-weight:800;
    letter-spacing:1px; cursor:pointer; border-radius:6px;
    line-height:1.5; transition:background 0.2s,box-shadow 0.2s;
}
#btn-bypass.active { background:var(--neon); color:#000; -webkit-text-fill-color:#000; border-color:var(--neon); box-shadow:0 0 16px var(--neon); }
#btn-bypass.inactive{ background:var(--red);  color:rgba(220,255,248,0.95); -webkit-text-fill-color:rgba(220,255,248,0.95); border-color:var(--red);  box-shadow:0 0 12px var(--red); }
.contour-row{ margin-bottom:10px; }
.progress-wrap{
    display:flex; align-items:center; gap:8px;
    margin-bottom:14px; margin-top:4px;
}
.progress-wrap input[type=range]{ flex:1; height:18px; accent-color:var(--neon); cursor:pointer; }
.time-label{ font-size:8px; letter-spacing:1px; color:var(--neon); -webkit-text-fill-color:var(--neon); min-width:30px; text-align:right; opacity:.65; }
.transport-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:4px; margin-bottom:5px; }
.action-grid   { display:grid; grid-template-columns:1fr; gap:4px; }

button,.file-label{
    background:transparent; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    border:1.5px solid rgba(0,255,204,0.45);
    padding:11px 4px; cursor:pointer; font-weight:700;
    border-radius:6px; font-size:9px; text-transform:uppercase;
    display:flex; justify-content:center; align-items:center;
    user-select:none; -webkit-user-select:none;
    transition:opacity 0.1s,transform 0.1s; letter-spacing:0.5px;
    -webkit-appearance:none; appearance:none;
    outline:none; -webkit-tap-highlight-color:transparent;
}
button:active,.file-label:active{ transform:scale(0.92); opacity:0.6; }
.recording{
    background:var(--red)!important; color:rgba(220,255,248,0.95)!important;
    -webkit-text-fill-color:rgba(220,255,248,0.95)!important;
    border-color:var(--red)!important;
    animation:blink 0.9s ease-in-out infinite;
}
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0.38} }

/* ═══════════════════════════════════════════
LANDSCAPE LAYOUT  (phone rotated)
sphere left | controls right
═══════════════════════════════════════════ */
@media (orientation:landscape) and (max-height:600px){
    body{ align-items:stretch; }
    .app-container{
        max-width:100vw; flex-direction:row;
    }
    /* Left col: header stacked above sphere */
    .left-col{
        display:flex; flex-direction:column;
        align-items:center; flex-shrink:0;
        width:44vw; border-right:1px solid #181818;
        background:var(--panel);
    }
    .top-header{
        width:100%; padding:6px 8px 5px; background:#080808;
        border-bottom:1px solid #181818; border-right:none;
    }
    .top-header h1{ font-size:0.62rem; letter-spacing:3px; }
    .hdr-btn{ font-size:7px; padding:4px 6px; }
    .main-interface{
        flex:1; padding:4px; width:100%;
    }
    .sphere-label{ font-size:6px; letter-spacing:3px; margin-bottom:3px; }
    .now-playing  { font-size:7px; margin-top:3px; }

    /* Right col: scrollable controls */
    .right-col{
        flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
        display:flex; flex-direction:column;
    }
    .control-panel{
        flex:1; padding:5px 10px 8px;
        border-top:none; overflow-y:auto;
    }
    #status-text{ margin-bottom:4px; font-size:7px; }
    .progress-wrap{ margin-bottom:8px; margin-top:2px; }
    .console-row{ margin-bottom:6px; gap:5px; }
    .contour-row{ margin-bottom:6px; }
    .transport-grid{ gap:3px; margin-bottom:4px; }
    .action-grid{ gap:3px; }
    button,.file-label{ padding:6px 3px; font-size:7px; }
    #btn-bypass{ height:38px; font-size:7px; }
    .vertical-track{ width:72px; }
    .vertical-track input[type=range]{ width:72px; }

    /* Playlist drawer slides from left in landscape */
    .playlist-drawer{
        top:0; bottom:0; left:0; right:auto;
        width:44vw; max-height:100dvh;
        border-radius:0 12px 12px 0;
        border-top:none; border-right:1.5px solid var(--neon);
        transform:translateX(-110%);
    }
    .playlist-drawer.open{ transform:translateX(0); }
}

/* ═══════════════════════════════════════════
PLAYLIST DRAWER
═══════════════════════════════════════════ */
.playlist-drawer{
    position:absolute;
    bottom:0; left:0; right:0;
    
    /* Frosted Glass Fix */
    background:rgba(5, 5, 8, 0.45);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    color:rgba(200,255,245,0.85); -webkit-text-fill-color:rgba(200,255,245,0.85);
    border-top:1.5px solid var(--neon);
    border-radius:14px 14px 0 0;
    transform:translateY(110%);
    transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
    z-index:100;
    display:flex; flex-direction:column;
    
    /* Height Fix */
    max-height: 50dvh; 
}
.playlist-drawer.open{ transform:translateY(0); }

.drawer-handle{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 7px;
    border-bottom:1px solid #1a1a1e; flex-shrink:0; gap:8px;
}
.drawer-title{
    font-size:9px; letter-spacing:3px; color:var(--neon);
    -webkit-text-fill-color:var(--neon);
    text-transform:uppercase; font-weight:700; flex:1;
}
.drawer-count{ font-size:8px; color:rgba(0,255,204,0.5); letter-spacing:1px; white-space:nowrap; }
.drawer-actions{ display:flex; gap:5px; }
.drawer-action-btn{
    font-size:7.5px; color:var(--neon);
    border:1px solid rgba(0,255,204,0.3); background:transparent;
    padding:4px 7px; border-radius:4px; cursor:pointer;
    white-space:nowrap; letter-spacing:0.5px; font-weight:700;
    transition:background 0.15s;
}
.drawer-action-btn:active{ background:rgba(0,255,204,0.12); }
.drawer-action-btn.danger{ color:var(--red); border-color:rgba(255,0,51,0.35); }

.drawer-load-row{
    display:grid; grid-template-columns:1fr 1fr;
    gap:7px; padding:8px 12px 7px;
    flex-shrink:0; border-bottom:1px solid #111;
}
.drawer-load-row button,.drawer-load-row .file-label{
    font-size:7.5px; padding:8px 4px;
}

.track-list{
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    flex:1; padding:3px 0 6px;
}
.track-item{
    display:flex; align-items:center;
    padding:9px 14px; cursor:pointer;
    border-bottom:1px solid rgba(0,255,204,0.05);
    transition:background 0.1s; gap:9px;
}
.track-item:active{ background:rgba(0,255,204,0.05); }
.track-item.active { background:rgba(0,255,204,0.08); }
.track-num{ font-size:9px; color:rgba(0,255,204,0.35); min-width:20px; text-align:right; letter-spacing:1px; }
.track-item.active .track-num{ color:var(--neon); -webkit-text-fill-color:var(--neon); }
.track-name{
    font-size:10px; color:rgba(200,255,246,0.75); -webkit-text-fill-color:rgba(200,255,246,0.75);
    flex:1; overflow:hidden;
    white-space:nowrap; text-overflow:ellipsis; letter-spacing:0.3px;
}
.track-item.active .track-name{ color:var(--neon); -webkit-text-fill-color:var(--neon); }
.track-dur{ font-size:8px; color:rgba(0,255,204,0.4); letter-spacing:1px; min-width:32px; text-align:right; }
.track-item.active .track-dur{ color:rgba(0,255,204,0.7); }

.track-indicator{ width:12px; display:flex; align-items:center; justify-content:center; }
.bars{ display:flex; gap:1px; align-items:flex-end; height:10px; }
.bars span{
    display:block; width:2px; background:var(--neon); border-radius:1px;
    animation:barBounce 0.6s ease-in-out infinite alternate;
}
.bars span:nth-child(2){ animation-delay:0.15s; }
.bars span:nth-child(3){ animation-delay:0.3s; }
@keyframes barBounce{ 0%{height:2px} 100%{height:9px} }

.empty-state{
    padding:30px 20px; text-align:center; font-size:9px;
    letter-spacing:2px; color:rgba(0,255,204,0.35); -webkit-text-fill-color:rgba(0,255,204,0.35); text-transform:uppercase;
    line-height:1.8;
}
.drawer-overlay{
    position:absolute; inset:0; 
    background:rgba(0,0,0,0.1); 
    z-index:99; display:none;
}
.drawer-overlay.visible{ display:block; }

</style>
</head>
<body>
<canvas id="sky-canvas"></canvas>
<div class="app-container" id="app">

    <div class="top-header" id="top-header">
        <h1>DEPTH<span>IMPACT</span> HYBRID</h1>
        <button class="hdr-btn" id="btn-library">☰ LIBRARY</button>
    </div>

    <div class="main-interface" id="main-interface">
        <div class="sphere-label">IMMERSION SPHERE</div>
        <div class="globe-wrapper" id="globe-wrapper">
            <div class="globe-ring-outer"></div>
            <div class="globe-ring-inner"></div>
            <canvas id="vc"></canvas>
        </div>
        <div class="now-playing" id="now-playing">—</div>
    </div>

    <div class="control-panel" id="control-panel">
        <div id="status-text">LOAD A FILE · PRESS PLAY</div>

        <div class="progress-wrap">
            <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1">
            <span class="time-label" id="time-display">0:00</span>
        </div>

        <div class="console-row">
            <div class="slider-bundle">
                <div class="vertical-track"><input type="range" id="clarity" min="0" max="100" value="0"></div>
                <span class="slider-label">CLARITY</span>
            </div>
            <div class="slider-bundle">
                <button id="btn-bypass" class="active">PROCESS<br>ON</button>
                <span class="slider-label">BYPASS</span>
            </div>
            <div class="slider-bundle">
                <div class="vertical-track"><input type="range" id="depth" min="0" max="100" value="0"></div>
                <span class="slider-label">DEPTH</span>
            </div>
        </div>

        <div class="slider-bundle contour-row">
            <span class="slider-label">LO CONTOUR</span>
            <input type="range" class="horizontal" id="contour" min="0" max="100" value="0">
        </div>

        <div class="transport-grid">
            <button id="btn-prev">|◀</button>
            <button id="btn-rw">« RW</button>
            <button id="btn-play">▶ PLAY</button>
            <button id="btn-stop">■ STOP</button>
            <button id="btn-ff">FF »</button>
            <button id="btn-next">▶|</button>
        </div>

        <input type="file" id="audio-upload" multiple
            accept="audio/*,.mp3,.m4a,.wav,.flac,.ogg,.aac" style="display:none">
        <div class="action-grid">
            <button id="btn-rec">● REC MP3</button>
        </div>
    </div>

    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="playlist-drawer" id="playlist-drawer">

        <div class="drawer-handle">
            <span class="drawer-title">LIBRARY</span>
            <span class="drawer-count" id="drawer-count">0 TRACKS</span>
            <div class="drawer-actions">
                <button class="drawer-action-btn" id="btn-save-playlist" title="Save playlist as .m3u">💾 SAVE</button>
                <button class="drawer-action-btn danger" id="btn-clear-playlist" title="Clear all tracks">✕ CLEAR</button>
                <button class="drawer-action-btn" id="drawer-close">CLOSE</button>
            </div>
        </div>

        <div class="drawer-load-row">
            <label for="drawer-upload" class="file-label">⊕ ADD FILES</label>
            <input type="file" id="drawer-upload" multiple
                accept="audio/*,.mp3,.m4a,.wav,.flac,.ogg,.aac" style="display:none">
            <button id="drawer-folder-btn">📁 ADD FOLDER</button>
        </div>

        <div class="track-list" id="track-list">
            <div class="empty-state" id="empty-state">
                NO TRACKS LOADED<br>USE ADD FILES OR FOLDER ABOVE
            </div>
        </div>
    </div>

</div><audio id="audio-el" preload="auto"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

<script>
"use strict";

// ═══════════════════════════════════════════════════════════════
//  CANVAS — sized dynamically, resized on orientation change
// ═══════════════════════════════════════════════════════════════
const canvas    = document.getElementById('vc');
const ctx       = canvas.getContext('2d');
let SIZE, CX, CY, R;

function calcSize(){
    const isLand = window.innerWidth > window.innerHeight && window.innerHeight < 600;
    if(isLand){
        const colW = Math.round(window.innerWidth * 0.44);
        const colH = window.innerHeight - 32 - 12;
        SIZE = Math.min(colW, colH) - 28;
    } else {
        SIZE = Math.min(Math.round(window.innerWidth * 0.72), 246);
    }
    SIZE = Math.max(SIZE, 100);
    canvas.width  = SIZE; canvas.height = SIZE;
    canvas.style.width  = SIZE+'px'; canvas.style.height = SIZE+'px';
    CX = SIZE/2; CY = SIZE/2; R = SIZE * 0.455;
}
calcSize();

// ═══════════════════════════════════════════════════════════════
//  LANDSCAPE DOM RESTRUCTURE
// ═══════════════════════════════════════════════════════════════
const app         = document.getElementById('app');
const topHeader   = document.getElementById('top-header');
const mainIface   = document.getElementById('main-interface');
const controlPanel= document.getElementById('control-panel');

let isLandscape = false;
let leftCol = null, rightCol = null;

function applyLayout(){
    const land = window.innerWidth > window.innerHeight && window.innerHeight < 600;
    if(land === isLandscape) return;
    isLandscape = land;

    if(land){
        // Build left + right columns
        leftCol  = document.createElement('div'); leftCol.className  = 'left-col';
        rightCol = document.createElement('div'); rightCol.className = 'right-col';
        leftCol.appendChild(topHeader);
        leftCol.appendChild(mainIface);
        rightCol.appendChild(controlPanel);
        
        // Insert before the drawer overlay
        const overlay = document.getElementById('drawer-overlay');
        app.insertBefore(leftCol,  overlay);
        app.insertBefore(rightCol, overlay);
    } else {
        // Restore flat portrait column layout
        if(leftCol && rightCol){
            app.insertBefore(topHeader,    leftCol);
            app.insertBefore(mainIface,    leftCol);
            app.insertBefore(controlPanel, leftCol);
            app.removeChild(leftCol);
            app.removeChild(rightCol);
            leftCol = rightCol = null;
        }
    }
    calcSize();
    rebuildStars();
}

let resizeTimer;
window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(applyLayout, 120);
});
window.addEventListener('orientationchange', ()=>{
    setTimeout(applyLayout, 250);
});
applyLayout();

// ═══════════════════════════════════════════════════════════════
//  AUDIO STATE & HARDWARE RACK VARS
// ═══════════════════════════════════════════════════════════════
let audioCtx=null, analyser=null, sourceNode=null;
let loFilter, hiFilter, masterGain;
let scriptProc=null, lameMp3Enc=null, mp3Chunks=[];
let isProcessing=true, isRecording=false, audioReady=false;

let fbqNotches = [], afsNotches = [];
let pathAGain, pathBGain;
let fbqIndex = 0, afsIndex = 0;

const audioEl    = document.getElementById('audio-el');
const bypassBtn  = document.getElementById('btn-bypass');
const statusEl   = document.getElementById('status-text');
const seekBar    = document.getElementById('seek-bar');
const timeLbl    = document.getElementById('time-display');
const nowPlaying = document.getElementById('now-playing');

// ═══════════════════════════════════════════════════════════════
//  PLAYLIST STATE
// ═══════════════════════════════════════════════════════════════
let playlist   = [];   
let currentIdx = -1;
let durations  = {};   
const AUDIO_EXTS = /\.(mp3|m4a|wav|flac|ogg|aac|opus|webm|weba)$/i;

// ═══════════════════════════════════════════════════════════════
//  GEODESIC SPHERE GEOMETRY & STARS
// ═══════════════════════════════════════════════════════════════
const LAT_DIVS=10, LON_DIVS=20;
const NODES=[], EDGES=[];
for(let li=0;li<=LAT_DIVS;li++){
    const frac=li/LAT_DIVS, lat=-Math.PI/2+Math.PI*frac;
    const type=frac<0.33?'lo':frac>0.66?'hi':'mid';
    const fi=type==='lo'?Math.floor(Math.random()*5):type==='hi'?19+Math.floor(Math.random()*37):5+Math.floor(Math.random()*14);
    const cnt=Math.max(1,Math.round(LON_DIVS*Math.cos(lat)));
    for(let lj=0;lj<cnt;lj++) NODES.push({lat,lon:2*Math.PI*lj/cnt+(li%2?0.18:0),type,fi});
}
for(let a=0;a<NODES.length;a++) for(let b=a+1;b<NODES.length;b++){
    const na=NODES[a],nb=NODES[b];
    let dlon=Math.abs(na.lon-nb.lon); if(dlon>Math.PI)dlon=2*Math.PI-dlon;
    if(Math.sqrt((na.lat-nb.lat)**2+(dlon*Math.cos((na.lat+nb.lat)/2))**2)<0.40) EDGES.push([a,b]);
}

const STAR_BANDS=[...Array(18).fill('lo'),...Array(16).fill('mid'),...Array(18).fill('hi')];
let STARS = [];
function makeStars(){
    return STAR_BANDS.map(band=>{
        const orbitR = 0.13+Math.random()*0.68;
        const dir    = Math.random()<0.3?-1:1;
        const speed  = dir*(0.055+Math.random()*0.20)/Math.sqrt(orbitR);
        const inclBase = band==='lo'?(Math.random()-0.5)*0.55
                       : band==='hi'?Math.PI*0.5+(Math.random()-0.5)*0.7
                       : (Math.random()-0.5)*Math.PI;
        const ecc = Math.random()*0.42;
        const fi  = band==='lo'?Math.floor(Math.random()*5)
                  : band==='hi'?19+Math.floor(Math.random()*35)
                  : 5+Math.floor(Math.random()*14);
        return {
            band, fi, hue:band, orbitR, speed, inclBase,
            ascNode0: Math.random()*Math.PI*2,
            precRate: (Math.random()-0.5)*0.012,
            wobbleAmp: 0.02+Math.random()*0.08,
            wobbleSpd: 0.008+Math.random()*0.025,
            wobblePhs: Math.random()*Math.PI*2,
            ecc, phase: Math.random()*Math.PI*2,
            size: 0.10+Math.random()*0.48*(1-orbitR*0.3),
            basOp: 0.20+Math.random()*0.50,
            twinkleSpeed: 0.5+Math.random()*2.5,
            twinkleAmp:   0.08+Math.random()*0.28,
            twinklePhase: Math.random()*Math.PI*2,
            trailLen: 3+Math.floor(Math.random()*5),
            trailDt:  0.18+Math.random()*0.25,
        };
    });
}
STARS = makeStars();
function rebuildStars(){ STARS = makeStars(); }

function getStarPos(s, t, timeOffset){
    const tEval = t-(timeOffset||0);
    const ascNode = s.ascNode0 + s.precRate*tEval;
    const incl    = s.inclBase + s.wobbleAmp*Math.sin(s.wobbleSpd*tEval+s.wobblePhs);
    const M = s.phase + s.speed*tEval;
    const E = M + s.ecc*Math.sin(M);
    const trueA = 2*Math.atan2(Math.sqrt(1+s.ecc)*Math.sin(E/2), Math.sqrt(1-s.ecc)*Math.cos(E/2));
    const r = Math.min(s.orbitR*R*(1-s.ecc*s.ecc)/(1+s.ecc*Math.cos(trueA)), R*0.87);
    const xOrb=r*Math.cos(trueA), yOrb=r*Math.sin(trueA);
    const cosI=Math.cos(incl),sinI=Math.sin(incl),cosN=Math.cos(ascNode),sinN=Math.sin(ascNode);
    return{ sx:CX+cosN*xOrb-sinN*yOrb*cosI, sy:CY-(sinN*xOrb+cosN*yOrb*cosI), depth:(yOrb*sinI)/R };
}

function proj(lat,lon,rotY){
    const cl=Math.cos(lat),sl=Math.sin(lat),co=Math.cos(lon+rotY),so=Math.sin(lon+rotY);
    return{ x:CX+cl*so*R, y:CY-sl*R, z:cl*co };
}

// ═══════════════════════════════════════════════════════════════
//  HARDWARE RACK ROUTING (BBE 882i, FBQ1000, dbx AFS2)
// ═══════════════════════════════════════════════════════════════
function buildAudioGraph(){
    if(audioReady) return true;
    try{
        audioCtx  = new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
        analyser  = audioCtx.createAnalyser(); analyser.fftSize = 2048; analyser.smoothingTimeConstant=0.78;
        sourceNode= audioCtx.createMediaElementSource(audioEl);
        
        // --- ROUTING SPLIT ---
        pathAGain = audioCtx.createGain(); pathAGain.gain.value = 0.7; // Series Path
        pathBGain = audioCtx.createGain(); pathBGain.gain.value = 0.3; // Parallel Path
        masterGain= audioCtx.createGain(); masterGain.gain.value = 1.0;

        // --- PATH A (SERIES): BBE 882i Sonic Maximizer ---
        loFilter  = audioCtx.createBiquadFilter(); loFilter.type='lowshelf'; loFilter.frequency.value=50; loFilter.gain.value=0;
        hiFilter  = audioCtx.createBiquadFilter(); hiFilter.type='highshelf'; hiFilter.frequency.value=5000; hiFilter.gain.value=0;
        
        // --- PATH A (SERIES): Behringer FBQ1000 ---
        let fbqChain = hiFilter; 
        for(let i=0; i<12; i++) {
            let notch = audioCtx.createBiquadFilter();
            notch.type = 'notch'; notch.Q.value = 60; 
            fbqChain.connect(notch);
            fbqChain = notch;
            fbqNotches.push(notch);
        }

        // --- PATH B (PARALLEL): dbx AFS2 ---
        let afsChain = audioCtx.createGain(); afsChain.gain.value = 1; 
        for(let i=0; i<24; i++) {
            let notch = audioCtx.createBiquadFilter();
            notch.type = 'notch'; notch.Q.value = 80; 
            afsChain.connect(notch);
            afsChain = notch;
            afsNotches.push(notch);
        }

        // --- CONNECTIONS ---
        sourceNode.connect(loFilter);
        loFilter.connect(hiFilter);
        fbqChain.connect(pathAGain);
        
        sourceNode.connect(afsChain);
        afsChain.connect(pathBGain);

        pathAGain.connect(masterGain);
        pathBGain.connect(masterGain);
        masterGain.connect(analyser); 
        analyser.connect(audioCtx.destination);

        try{
            scriptProc = audioCtx.createScriptProcessor(4096,2,2);
            const sink = audioCtx.createGain(); sink.gain.value=0;
            masterGain.connect(scriptProc); scriptProc.connect(sink); sink.connect(audioCtx.destination);
            scriptProc.onaudioprocess = e=>{
                if(!isRecording||!lameMp3Enc) return;
                const buf = lameMp3Enc.encodeBuffer(floatTo16(e.inputBuffer.getChannelData(0)), floatTo16(e.inputBuffer.getChannelData(1)));
                if(buf.length>0) mp3Chunks.push(new Int8Array(buf));
            };
        }catch(e){ console.warn('ScriptProcessor N/A',e); }
        
        audioReady=true; 
        huntFeedback(); 
        return true;
    }catch(e){ console.error('AudioCtx failed',e); setStatus('AUDIO ENGINE ERROR'); return false; }
}

function floatTo16(buf){
    const CEIL=0.9886, out=new Int16Array(buf.length);
    for(let i=0;i<buf.length;i++){const s=Math.max(-CEIL,Math.min(CEIL,buf[i])); out[i]=s<0?s*0x8000:s*0x7FFF;}
    return out;
}
function resumeCtx(){ if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); }

function huntFeedback() {
    requestAnimationFrame(huntFeedback);
    if(!isProcessing || !audioReady || audioEl.paused) return;

    const data = new Float32Array(analyser.frequencyBinCount);
    analyser.getFloatFrequencyData(data);

    for(let i=0; i<data.length; i++) {
        if(data[i] > -12) {
            const freq = i * audioCtx.sampleRate / analyser.fftSize;
            if(freq < 200 || freq > 12000) continue; 

            fbqNotches[fbqIndex % 12].frequency.value = freq;
            fbqIndex++;

            afsNotches[afsIndex % 24].frequency.value = freq;
            afsIndex++;
        }
    }
}

async function addFiles(files){
    const filtered = [...files].filter(f=>AUDIO_EXTS.test(f.name)||f.type.startsWith('audio/'));
    if(!filtered.length) return;
    filtered.forEach(f=>{
        const url  = URL.createObjectURL(f);
        const name = f.name.replace(/\.[^.]+$/,'');
        playlist.push({name, url, file:f});
        probeDuration(url, playlist.length-1);
    });
    if(currentIdx===-1) currentIdx=0;
    renderPlaylist();
    nowPlaying.textContent = playlist[currentIdx].name;
    setStatus('READY · PRESS PLAY');
}

function probeDuration(url, idx){
    const tmp=new Audio(); tmp.src=url;
    tmp.onloadedmetadata=()=>{
        durations[url]=fmt(tmp.duration);
        const rows=document.querySelectorAll('.track-item');
        if(rows[idx]){ const d=rows[idx].querySelector('.track-dur'); if(d) d.textContent=durations[url]; }
    };
}

function loadTrack(idx, autoplay){
    if(idx<0||idx>=playlist.length) return;
    currentIdx=idx;
    const track=playlist[idx];
    audioEl.src=track.url; audioEl.load();
    nowPlaying.textContent=track.name;
    setStatus('LOADED: '+(track.name.length>22?track.name.slice(0,19)+'…':track.name).toUpperCase());
    seekBar.value=0; timeLbl.textContent='0:00';
    renderPlaylist();
    if(autoplay){
        if(!audioReady&&!buildAudioGraph()) return;
        resumeCtx();
        audioEl.play()
            .then(()=>setStatus(isProcessing?'PROCESSING':'BYPASSED'))
            .catch(()=>setStatus('PLAYBACK BLOCKED'));
    }
}

function renderPlaylist(){
    const list  = document.getElementById('track-list');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('drawer-count');
    count.textContent = playlist.length+' TRACK'+(playlist.length!==1?'S':'');
    if(!playlist.length){ list.innerHTML=''; list.appendChild(empty); empty.style.display='block'; return; }
    empty.style.display='none';
    list.innerHTML='';
    playlist.forEach((t,i)=>{
        const div=document.createElement('div');
        div.className='track-item'+(i===currentIdx?' active':'');
        div.innerHTML=
            `<span class="track-num">${String(i+1).padStart(2,'0')}</span>`+
            `<span class="track-name">${esc(t.name)}</span>`+
            `<span class="track-indicator">${i===currentIdx?'<div class="bars"><span></span><span></span><span></span></div>':''}</span>`+
            `<span class="track-dur">${durations[t.url]||'—'}</span>`;
        // Auto-close drawer fix added here
        div.addEventListener('click',()=>{ loadTrack(i,true); closeDrawer(); });
        list.appendChild(div);
    });
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('btn-save-playlist').addEventListener('click',()=>{
    if(!playlist.length){ setStatus('NOTHING TO SAVE'); return; }
    let m3u = '#EXTM3U\n\n';
    playlist.forEach(t=>{
        const dur = durations[t.url] ? durationSecs(durations[t.url]) : -1;
        m3u += `#EXTINF:${dur},${t.name}\n${t.file ? t.file.name : t.name}\n\n`;
    });
    const blob=new Blob([m3u],{type:'audio/x-mpegurl'});
    const url=URL.createObjectURL(blob);
    const a=Object.assign(document.createElement('a'),{href:url, download:'DepthImpact_Playlist.m3u'});
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    setStatus('PLAYLIST SAVED ✓');
});

function durationSecs(str){
    const [m,s]=(str||'0:00').split(':').map(Number);
    return (m*60+s)|0;
}

document.getElementById('btn-clear-playlist').addEventListener('click',()=>{

    playlist.forEach(t=>URL.revokeObjectURL(t.url));
    playlist=[]; currentIdx=-1; durations={};

async function collectDirFiles(dirHandle, files){
    for await(const entry of dirHandle.values()){
        if(entry.kind==='file'&&AUDIO_EXTS.test(entry.name)){
            files.push(await entry.getFile());
        } else if(entry.kind==='directory'){
            await collectDirFiles(entry, files);
        }
    }
}
async function openFolder(){
    if(window.showDirectoryPicker){
        try{
            setStatus('SELECTING FOLDER…');
            const dir=await window.showDirectoryPicker({mode:'read'});
            setStatus('SCANNING…');
            const files=[];
            await collectDirFiles(dir, files);
            if(!files.length){ setStatus('NO AUDIO FILES FOUND'); return; }
            files.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
            await addFiles(files);
            openDrawer();
            setStatus(files.length+' TRACKS LOADED');
        }catch(e){
            if(e.name!=='AbortError') setStatus('FOLDER ACCESS DENIED');
            else setStatus(playlist.length?'READY':'LOAD A FILE · PRESS PLAY');
        }
    } else {
        const inp=document.createElement('input');
        inp.type='file'; inp.multiple=true;
        inp.setAttribute('webkitdirectory',''); inp.setAttribute('directory','');
        inp.accept='audio/*,.mp3,.m4a,.wav,.flac,.ogg,.aac';
        inp.onchange=async e=>{ await addFiles(e.target.files); openDrawer(); setStatus(playlist.length+' TRACKS LOADED'); };
        inp.click();
    }
}

// ═══════════════════════════════════════════════════════════════
//  DRAW LOOP
// ═══════════════════════════════════════════════════════════════
function draw(){
    requestAnimationFrame(draw);
    const bins=analyser?analyser.frequencyBinCount:64;
    const freq=new Uint8Array(bins);
    if(analyser) analyser.getByteFrequencyData(freq);
    const clarityVal=document.getElementById('clarity').value/100;
    const depthVal  =document.getElementById('depth').value/100;
    const contourVal=document.getElementById('contour').value/100;

    ctx.clearRect(0,0,SIZE,SIZE);
    const bg=ctx.createRadialGradient(CX,CY*0.85,0,CX,CY,R*1.05);
    bg.addColorStop(0,'rgba(4,28,22,1)'); bg.addColorStop(0.5,'rgba(2,14,12,1)'); bg.addColorStop(1,'rgba(0,4,8,1)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,R-0.5,0,Math.PI*2); ctx.clip();

    const t=Date.now()/1000;
    STARS.forEach(s=>{
        const rawFreq=freq[Math.min(s.fi,bins-1)]/255;
        const boost=s.band==='lo'?contourVal*0.6:s.band==='hi'?clarityVal*0.6:depthVal*0.4;
        const energy=Math.min(1,rawFreq+boost);
        let cr,cg,cb;
        if(s.hue==='lo'){cr=0;cg=210;cb=140;}else if(s.hue==='hi'){cr=170;cg=235;cb=255;}else{cr=0;cg=255;cb=215;}
        const bloom=energy*0.68;
        const r=Math.round(cr+(255-cr)*bloom), g=Math.round(cg+(255-cg)*bloom*0.45), b=Math.round(cb+(255-cb)*bloom*0.25);
        for(let step=s.trailLen;step>=1;step--){
            const ghost=getStarPos(s,t,step*s.trailDt);
            if(ghost.depth<-0.05) continue;
            const gd=0.28+0.72*((ghost.depth+1)/2), fade=1-step/(s.trailLen+1);
            ctx.beginPath(); ctx.arc(ghost.sx,ghost.sy,Math.max(0.1,s.size*0.55*fade*gd),0,Math.PI*2);
            ctx.fillStyle=`rgba(${cr},${cg},${cb},${fade*0.18*gd*(0.4+energy*0.5)})`; ctx.fill();
        }
        const pos=getStarPos(s,t);
        if(pos.depth<-0.08) return;
        const da=0.28+0.72*((pos.depth+1)/2), ds=0.50+0.50*((pos.depth+1)/2);
        const tw=1+(s.twinkleAmp+energy*0.22)*Math.sin(t*s.twinkleSpeed+s.twinklePhase);
        const alpha=Math.min(1,(s.basOp+energy*0.45)*da*tw);
        const radius=(s.size+energy*1.1)*ds;
        const haloR=Math.max(radius*2.5,radius*2.5+energy*4.5);
        if(alpha>0.08){
            const glow=ctx.createRadialGradient(pos.sx,pos.sy,0,pos.sx,pos.sy,haloR);
            glow.addColorStop(0,`rgba(${r},${g},${b},${alpha*(0.28+energy*0.38)})`);
            glow.addColorStop(0.5,`rgba(${cr},${cg},${cb},${alpha*0.05})`);
            glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(pos.sx,pos.sy,haloR,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(pos.sx,pos.sy,Math.max(0.18,radius),0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,alpha)})`; ctx.fill();
    });

    const rotY=(Date.now()/1000)*0.16;
    const P=NODES.map(n=>proj(n.lat,n.lon,rotY));
    const edgeSorted=EDGES.map(([a,b])=>({a,b,pa:P[a],pb:P[b],midZ:(P[a].z+P[b].z)/2})).sort((x,y)=>x.midZ-y.midZ);
    edgeSorted.forEach(({a,b,pa,pb,midZ})=>{
        if(pa.z<0.0&&pb.z<0.0) return;
        const vis=Math.min(1,Math.max(0,midZ+0.18)*3.5); if(vis<=0) return;
        const na=NODES[a],nb=NODES[b];
        const e=(freq[Math.min(na.fi,bins-1)]+freq[Math.min(nb.fi,bins-1)])/(2*255);
        const[r,g,b2]=na.type==='lo'?[0,200,155]:na.type==='hi'?[160,245,255]:[0,255,215];
        ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
        ctx.strokeStyle=`rgba(${r},${g},${b2},${Math.min(0.55,(0.04+e*0.38)*vis)})`;
        ctx.lineWidth=0.4+e*0.85; ctx.stroke();
    });

    NODES.forEach((n,i)=>{
        const p=P[i]; if(p.z<-0.12) return;
        const rawV=freq[Math.min(n.fi,bins-1)]/255;
        const boost=n.type==='lo'?contourVal*0.55:n.type==='hi'?clarityVal*0.55:depthVal*0.35;
        const energy=Math.min(1,rawV+boost);
        const vis=Math.max(0,p.z+0.18);
        const dotR=Math.max(0.3,(0.8+energy*3.8)*vis);
        const[cr,cg,cb]=n.type==='lo'?[0,210,140]:n.type==='hi'?[170,240,255]:[0,255,210];
        if(energy>0.06){
            const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,dotR*5);
            glow.addColorStop(0,`rgba(${cr},${cg},${cb},${energy*0.55*vis})`);
            glow.addColorStop(0.4,`rgba(${cr},${cg},${cb},${energy*0.12*vis})`);
            glow.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(p.x,p.y,dotR*5,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
        }
        const wm=energy*0.85;
        ctx.beginPath(); ctx.arc(p.x,p.y,dotR,0,Math.PI*2);
        ctx.fillStyle=`rgba(${Math.round(cr+(255-cr)*wm)},${Math.round(cg+(255-cg)*wm*0.4)},${Math.round(cb+(255-cb)*wm*0.25)},${Math.min(1,0.45+energy*0.75)*vis})`;
        ctx.fill();
    });

    ctx.restore();
    const spec=ctx.createRadialGradient(CX-R*0.38,CY-R*0.38,0,CX,CY,R);
    spec.addColorStop(0,'rgba(0,255,200,0.08)'); spec.addColorStop(0.55,'rgba(0,255,200,0.01)'); spec.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=spec; ctx.fill();
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.strokeStyle='rgba(0,255,204,0.32)'; ctx.lineWidth=1.8; ctx.stroke();
}
draw();

// ═══════════════════════════════════════════════════════════════
//  MIDNIGHT SKY 
// ═══════════════════════════════════════════════════════════════
(function(){
    const sky = document.getElementById('sky-canvas');
    const sc  = sky.getContext('2d');
    let sw, sh, SKY_STARS=[];

    const SKY_COLORS = [
        [190,240,255], [210,255,248], [200,220,255], [180,210,255], [255,240,220]
    ];

    function makeSkyStars(){
        SKY_STARS = [];
        const count = Math.round((sw*sh)/1800); 
        for(let i=0;i<count;i++){
            const col = SKY_COLORS[Math.random()<0.6?0:Math.floor(Math.random()*SKY_COLORS.length)];
            const size = Math.random()<0.92 ? 0.25+Math.random()*0.6 : 0.8+Math.random()*1.0; 
            SKY_STARS.push({
                x: Math.random()*sw,
                y: Math.random()*sh,
                size,
                col,
                basAlpha : 0.35+Math.random()*0.55,
                twinkSpd : 0.4+Math.random()*2.2,
                twinkAmp : 0.06+Math.random()*0.28,
                twinkPhs : Math.random()*Math.PI*2,
                dx : (Math.random()-0.5)*0.012,
                dy : (Math.random()-0.5)*0.006,
            });
        }
    }

    function resizeSky(){
        sw = sky.width  = window.innerWidth;
        sh = sky.height = window.innerHeight;
        makeSkyStars();
    }
    resizeSky();
    window.addEventListener('resize', resizeSky);

    function drawSky(){
        requestAnimationFrame(drawSky);
        const t = Date.now()/1000;

        const grad = sc.createLinearGradient(0,0,0,sh);
        grad.addColorStop(0,   '#08080c');
        grad.addColorStop(0.5, '#060608');
        grad.addColorStop(1,   '#040406');
        sc.fillStyle = grad;
        sc.fillRect(0,0,sw,sh);

        [[sw*0.15,sh*0.2,sw*0.28],[sw*0.78,sh*0.6,sw*0.22],[sw*0.5,sh*0.85,sw*0.18]].forEach(([nx,ny,nr])=>{
            const ng=sc.createRadialGradient(nx,ny,0,nx,ny,nr);
            ng.addColorStop(0,'rgba(0,60,50,0.07)');
            ng.addColorStop(1,'rgba(0,0,0,0)');
            sc.fillStyle=ng; sc.fillRect(0,0,sw,sh);
        });

        SKY_STARS.forEach(s=>{
            s.x = (s.x+s.dx+sw)%sw;
            s.y = (s.y+s.dy+sh)%sh;
            const tw = 1 + s.twinkAmp*Math.sin(t*s.twinkSpd+s.twinkPhs);
            const alpha = Math.min(1, s.basAlpha*tw);
            const[r,g,b] = s.col;

            if(s.size>0.7){
                const halo=sc.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*3.5);
                halo.addColorStop(0,`rgba(${r},${g},${b},${alpha*0.3})`);
                halo.addColorStop(1,'rgba(0,0,0,0)');
                sc.beginPath(); sc.arc(s.x,s.y,s.size*3.5,0,Math.PI*2);
                sc.fillStyle=halo; sc.fill();
            }
            sc.beginPath(); sc.arc(s.x,s.y,Math.max(0.2,s.size),0,Math.PI*2);
            sc.fillStyle=`rgba(${r},${g},${b},${alpha})`;
            sc.fill();
        });
    }
    drawSky();
})();
</script>
