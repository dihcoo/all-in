<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depthimpact Hybrid</title>
    <style>
        :root {
            --bg-color: #050a08;
            --neon-green: #38e4a5;
            --dark-green: #1a4a38;
            --text-muted: #6b9a88;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Monospace for tech feel */
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            font-weight: bold;
        }

        .library-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .library-btn:hover {
            background: var(--dark-green);
        }

        /* Immersion Sphere */
        .sphere-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .sphere-title {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .sphere-container {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 1px solid rgba(56, 228, 165, 0.2);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateSphere 20s linear infinite;
        }

        .star {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
            animation: pulseStar 2s infinite alternate;
        }

        /* Positioning the 8 stars in a circle */
        .star:nth-child(1) { transform: rotate(0deg) translateY(-90px); }
        .star:nth-child(2) { transform: rotate(45deg) translateY(-90px); }
        .star:nth-child(3) { transform: rotate(90deg) translateY(-90px); }
        .star:nth-child(4) { transform: rotate(135deg) translateY(-90px); }
        .star:nth-child(5) { transform: rotate(180deg) translateY(-90px); }
        .star:nth-child(6) { transform: rotate(225deg) translateY(-90px); }
        .star:nth-child(7) { transform: rotate(270deg) translateY(-90px); }
        .star:nth-child(8) { transform: rotate(315deg) translateY(-90px); }

        /* Track Info */
        .track-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .track-name {
            font-size: 12px;
            color: var(--white);
            margin-bottom: 5px;
        }

        .processing-text {
            font-size: 10px;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 2px;
            background: var(--dark-green);
            position: relative;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 45%;
            background: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
        }

        /* Main Controls Layout */
        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* Vertical Sliders (Clarity & Depth) */
        .vertical-slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .vertical-slider {
            writing-mode: vertical-lr;
            direction: rtl;
            width: 8px;
            height: 100px;
            -webkit-appearance: slider-vertical;
            accent-color: var(--neon-green);
            cursor: pointer;
        }

        .slider-label {
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* Center Process Button */
        .center-process {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .process-btn-group {
            background: var(--dark-green);
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
        }

        .btn-process {
            background: var(--neon-green);
            color: var(--bg-color);
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(56, 228, 165, 0.4);
            margin-bottom: 5px;
        }

        .btn-bypass {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 5px;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* Horizontal Slider (Lo Contour) */
        .horizontal-slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .horizontal-slider {
            width: 60%;
            accent-color: var(--neon-green);
            cursor: pointer;
        }

        /* Transport Controls */
        .transport-controls {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: 20px;
        }

        .btn-transport {
            flex: 1;
            background: transparent;
            border: 1px solid var(--dark-green);
            color: var(--neon-green);
            padding: 10px 0;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-transport:hover, .btn-transport.active {
            border-color: var(--neon-green);
            background: rgba(56, 228, 165, 0.1);
        }

        /* Footer Record Button */
        .footer-controls {
            display: flex;
            justify-content: center;
        }

        .btn-rec {
            background: transparent;
            border: 1px solid var(--dark-green);
            color: var(--text-muted);
            padding: 8px 30px;
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
        }

        /* Animations */
        @keyframes rotateSphere {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseStar {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <div>DEPTHIMPACT HYBRID</div>
        <button class="library-btn" onclick="alert('Library Modal Removed for Immersion!')"># LIBRARY</button>
    </header>

    <div class="sphere-section">
        <div class="sphere-title">IMMERSION SPHERE</div>
        <div class="sphere-container">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>
    </div>

    <div class="track-info">
        <div class="track-name">EchoesoftheFirstHater.wav</div>
        <div class="processing-text">PROCESSING...</div>
    </div>

    <div class="progress-container">
        <span>1:24</span>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <span></span>
    </div>

    <div class="main-controls">
        <div class="vertical-slider-wrapper">
            <input type="range" min="0" max="100" value="70" class="vertical-slider">
            <span class="slider-label">CLARITY</span>
        </div>

        <div class="center-process">
            <div class="process-btn-group">
                <button class="btn-process">PROCESS ON</button>
                <button class="btn-bypass">BYPASS</button>
            </div>
        </div>

        <div class="vertical-slider-wrapper">
            <input type="range" min="0" max="100" value="40" class="vertical-slider">
            <span class="slider-label">DEPTH</span>
        </div>
    </div>

    <div class="horizontal-slider-wrapper">
        <span class="slider-label">LO CONTOUR</span>
        <input type="range" min="0" max="100" value="80" class="horizontal-slider">
    </div>

    <div class="transport-controls">
        <button class="btn-transport">« RW</button>
        <button class="btn-transport active">► PLAY</button>
        <button class="btn-transport">■ STOP</button>
        <button class="btn-transport">FF »</button>
        <button class="btn-transport">▶|</button>
    </div>

    <div class="footer-controls">
        <button class="btn-rec">
            <div class="rec-dot"></div> REC MP3
        </button>
    </div>

</div>

</body>
</html>
